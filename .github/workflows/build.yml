name: Build-Auto-EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    - name: Create EXE
      run: |
        pyinstaller --onefile --windowed --name "MouseOptimizer" main.py
    - name: Upload EXE
      uses: actions/upload-artifact@v3
      with:
        name: MyProgram
        path: dist/MouseOptimizer.exe
