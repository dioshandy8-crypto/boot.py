name: Build-Auto-EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Menambah cache agar lebih stabil
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy pillow pynput pywin32 pyinstaller 
    - name: Create EXE
      run: |
        # Memastikan numpy dkk terbaca oleh pyinstaller
        python -m PyInstaller --onefile --windowed --name "MouseOptimizer" main.py
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: MyProgram
        path: dist/MouseOptimizer.exe
