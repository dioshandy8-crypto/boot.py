name: Build-Windows-EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller pynput pyautogui numpy pywin32 Pillow
          
      - name: Build EXE
        run: |
          pyinstaller --noconsole --onefile --uac-admin --clean main.py
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bot_Zensware_EXE
          path: dist/main.exe
